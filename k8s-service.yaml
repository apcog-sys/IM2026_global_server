apiVersion: v1
kind: Service
metadata:
  name: information-mediator-gs-svc
  namespace: default
spec:
  selector:
    app: information-mediator-gs   # matches the pod template label in your deployment
  ports:
  - name: http
    port: 80
    targetPort: 9000               # your container's containerPort
    protocol: TCP
  type: ClusterIP