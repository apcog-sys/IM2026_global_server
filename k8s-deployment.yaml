apiVersion: apps/v1
kind: Deployment
metadata:
  name: information-mediator-gs
  labels:
    app: information-mediator-gs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: information-mediator-gs
  template:
    metadata:
      labels:
        app: information-mediator-gs
    spec:
      containers:
        - name: information-mediator-gs
          image: msahique/information_mediator_gs:v1
          ports:
            - containerPort: 9000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
